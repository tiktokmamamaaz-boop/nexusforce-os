<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusForce OS | Ultra-Agent Swarm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .nexus-gradient { background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .agent-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .agent-card:hover { border-color: #0071e3; transform: translateY(-5px); background: rgba(0, 113, 227, 0.05); }
        .status-pulse { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-10">

    <div class="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-12 gap-6 h-[90vh]">
        
        <aside class="lg:col-span-3 glass-panel rounded-[32px] p-8 flex flex-col">
            <div class="mb-12 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center font-bold text-xl">N</div>
                <h1 class="font-bold tracking-tighter text-2xl uppercase">NexusForce</h1>
            </div>
            
            <nav class="space-y-2 flex-1">
                <button class="w-full text-left p-4 rounded-2xl bg-white/5 font-semibold text-blue-400">Command Center</button>
                <button class="w-full text-left p-4 rounded-2xl text-gray-400 hover:bg-white/5 transition">War Room</button>
                <button class="w-full text-left p-4 rounded-2xl text-gray-400 hover:bg-white/5 transition">Financial Hub</button>
                <button class="w-full text-left p-4 rounded-2xl text-gray-400 hover:bg-white/5 transition">Agent Vault</button>
            </nav>

            <div class="mt-auto pt-6 border-t border-white/5">
                <div class="p-5 rounded-2xl bg-blue-600/10 border border-blue-600/20">
                    <p class="text-[10px] uppercase font-bold text-blue-400 mb-1">Nexus Balance</p>
                    <p class="text-2xl font-bold">$14,200.00</p>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-9 space-y-6 overflow-y-auto pr-2 custom-scrollbar">
            
            <div class="glass-panel rounded-[32px] p-10 relative overflow-hidden">
                <div class="relative z-10">
                    <span class="text-blue-500 font-bold text-xs uppercase tracking-[0.3em]">Quantum Command Center</span>
                    <h2 class="text-5xl font-bold mt-4 tracking-tighter leading-tight">What shall we <br><span class="text-gray-500">automate today?</span></h2>
                    
                    <div class="mt-10 flex gap-4">
                        <input type="text" id="mission-input" placeholder="Initiate swarm protocol..." class="flex-1 bg-white/5 p-6 rounded-2xl border border-white/10 outline-none focus:border-blue-600 transition">
                        <button onclick="deploy()" class="bg-blue-600 px-10 rounded-2xl font-bold hover:bg-blue-700 transition shadow-2xl shadow-blue-600/20">DEPLOY</button>
                    </div>
                </div>
                <div class="absolute -right-20 -top-20 w-80 h-80 bg-blue-600/10 blur-[120px] rounded-full"></div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="agent-card p-6 rounded-[24px] bg-white/[0.02]">
                    <div class="status-pulse mb-4"></div>
                    <h4 class="font-bold text-sm">Intel Agent</h4>
                    <p class="text-[10px] text-gray-500 mt-1 uppercase tracking-widest">Active Scan</p>
                </div>
                <div class="agent-card p-6 rounded-[24px] bg-white/[0.02]">
                    <div class="status-pulse mb-4"></div>
                    <h4 class="font-bold text-sm">Finance Core</h4>
                    <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest">Auditing</p>
                </div>
                <div class="agent-card p-6 rounded-[24px] bg-blue-600/20 flex items-center justify-center">
                    <p class="font-bold text-xs">+34 AGENTS READY</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass-panel p-8 rounded-[28px] flex items-center justify-between">
                    <div>
                        <h4 class="font-bold text-lg">JazzCash</h4>
                        <p class="text-xs text-gray-500">Instant Pakistani Gateway</p>
                    </div>
                    <button class="bg-white text-black px-6 py-3 rounded-xl font-bold text-sm">RECHARGE</button>
                </div>
                <div class="glass-panel p-8 rounded-[28px] flex items-center justify-between">
                    <div>
                        <h4 class="font-bold text-lg">EasyPaisa</h4>
                        <p class="text-xs text-gray-400">Mobile Wallet Secure</p>
                    </div>
                    <button class="bg-white/10 text-white px-6 py-3 rounded-xl font-bold text-sm">RECHARGE</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        function deploy() {
            const val = document.getElementById('mission-input').value;
            if(!val) return alert("Please enter mission details.");
            alert("Swarm protocol initiated for: " + val);
        }
    </script>
</body>
</html>
